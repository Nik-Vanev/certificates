<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Zertifikats Portfolio</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #38bdf8;
            font-size: 2rem;
            margin-bottom: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .card {
            background-color: #1e293b;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .card img {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 4px;
            background-color: #0f172a;
            margin-bottom: 15px;
        }
        .card h2 {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #f1f5f9;
        }
        .card p {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background-color: #38bdf8;
            color: #0f172a;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mein Zertifikats Portfolio</h1>
        <div class="grid">
            
            <div class="card">
                <img src="images/zertifikat.png" alt="Zertifikat Bild">
                <h2>Anthropic Claude AI Zertifikat</h2>
                <p>Kenntnisse im Bereich Prompt Engineering und künstliche Intelligenz.</p>
                <a href="certs/zertifikat.pdf" class="btn" target="_blank">PDF anzeigen</a>
            </div>

        </div>
    </div>
</body>
</html>
